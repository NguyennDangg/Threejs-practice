<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Day 06 — GLSL Fundamentals</title>
    <style>
      * {
        margin: 0;
        padding: 0;
      }

      body {
        background: #000;
        overflow: hidden;
      }

      canvas {
        display: block;
      }
    </style>
  </head>

  <body>
    <canvas id="glcanvas"></canvas>

    <script>
      const canvas = document.getElementById("glcanvas");
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;

      // getContext('webgl') gives us raw access to the GPU
      // this is the exact thing Three.js does internally
      // setup
      const gl = canvas.getContext("webgl");

      // Vertex shader
      // Minimal — just draws a rectangle covering the whole screen
      // don't care about 3D positions here, only pixels
      const vertexShaderSource = `
      attribute vec2 a_position;
      void main() {
        gl_Position = vec4(a_position, 0.0, 1.0);
      }
    `;

      // Fragment shader
      // This is the part that will be editing constantly (change the colors)
      // sets decimal precision for all float math below — required in fragment shaders
      // built-in variable, automatically available in every fragment shader
      // st = this pixel's position, normalized from 0.0 to 1.0 across the screen
      // Use st.x (horizontal position) to control the Red channel
      // Use st.y (vertical position) to control the Green channel
      const fragmentShaderSource = `
      precision mediump float;
      uniform vec2 u_resolution;

      void main() {
        vec2 st = gl_FragCoord.xy / u_resolution.xy;
        gl_FragColor = vec4(st.x, st.y, 0.5, 1.0); 
      }
    `; // 0.5 = constant blue, washes gradient toward pink

      // Compile a shader from source code
      function createShader(gl, type, source) {
        const shader = gl.createShader(type);
        gl.shaderSource(shader, source);
        gl.compileShader(shader);
        if (!gl.getShaderParameter(shader, gl.COMPILE_STATUS)) {
          console.error(gl.getShaderInfoLog(shader));
          return null;
        }
        return shader;
      }

      // vertexShader and fragmentShader cannot live without eachother
      const vertexShader = createShader(
        gl,
        gl.VERTEX_SHADER,
        vertexShaderSource,
      );
      const fragmentShader = createShader(
        gl,
        gl.FRAGMENT_SHADER,
        fragmentShaderSource,
      );

      // Link both shaders into one program (the pipeline for vertex and fragment)
      const program = gl.createProgram();
      gl.attachShader(program, vertexShader);
      gl.attachShader(program, fragmentShader);
      gl.linkProgram(program);
      gl.useProgram(program);

      // Define a fullscreen rectangle (two triangles) to GPU memory
      // (-1,-1) bottom-left
      // (1, 1) top-right
      const positions = new Float32Array([
        -1, -1, 1, -1, -1, 1, // triangle 1
        -1, 1, 1, -1, 1, 1,   // triangle 2
      ]);
      const positionBuffer = gl.createBuffer();
      // shipping data to the GPU
      gl.bindBuffer(gl.ARRAY_BUFFER, positionBuffer);
      gl.bufferData(gl.ARRAY_BUFFER, positions, gl.STATIC_DRAW);

      const positionLocation = gl.getAttribLocation(program, "a_position");
      gl.enableVertexAttribArray(positionLocation);
      gl.vertexAttribPointer(positionLocation, 2, gl.FLOAT, false, 0, 0);

      // Pass resolution into the shader
      // u_resolution tells the GPU how big the screen currently is
      const resolutionLocation = gl.getUniformLocation(program, "u_resolution");
      gl.uniform2f(resolutionLocation, canvas.width, canvas.height);

      // Draw
      gl.viewport(0, 0, canvas.width, canvas.height);
      // only one line that changes the whole experience
      // gl.TRIANGLES: Connect the coordinates into solid triangles
      // 0: Start reading from the very first item in our positions buffer
      // 6: Read exactly 6 vertices total (3 vertices per triangle * 2 triangles)
      gl.drawArrays(gl.TRIANGLES, 0, 6);
    </script>
  </body>
</html>
